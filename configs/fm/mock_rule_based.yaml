# ─────────────────────────────────────────────────────────────────────────────
# Mock FM Tier 2 — Rule-based config / Tier 2 Rule-based 설정.
#
# Owner: plan_1.6.5 (RuleBasedBiosignalFM).
# Spec : docs/fm_interface_guide.md §2, ADR-011 §"3 tiers".
#
# Status / 상태:
#   Implemented (2026-05-16). Thresholds below are heuristics — every
#   threshold carries an implicit
#   ``[CLINICIAN-REVIEW: 의료진 검토 필요]`` mark.
#   구현 완료 (2026-05-16). 아래 threshold는 휴리스틱이며 모두 암묵적으로
#   ``[CLINICIAN-REVIEW]``가 적용된다.
#
# Tunable fields / 조정 가능 필드:
#   seed                 : RNG seed (downstream usage TBD).
#   latent_dim           : encode() output dimension.
#   sampling_rate_hz     : assumed signal sampling rate for slope conversion.
#   noise_pct            : global ±jitter as fraction of output (mock-real gap).
#   noise_per_method     : per-method noise overrides.
#   noise_seed           : independent seed for the noise RNG.
#
# Thresholds are baked into the implementation
# (opsight/fm/mock_rule_based.py) as module-level constants — change them
# there + amend ADR-011 if needed. Listed here for documentation only.
# Threshold는 구현체 (opsight/fm/mock_rule_based.py) 안 module-level 상수에
# 박혀 있다 — 변경 필요 시 그곳을 수정하고 ADR-011을 amend한다. 여기엔 참고용.
# ─────────────────────────────────────────────────────────────────────────────
fm:
  implementation: mock_rule_based
  config:
    seed: 42
    latent_dim: 128
    sampling_rate_hz: 500.0

    # Noise injection — mitigates over-fit to mock behavior (ADR-011 risk #1).
    # Real-FM swap retains schema with noise_pct=0 for clean config diffs.
    # Noise 주입 — mock 행동 과적합 완화 (ADR-011 risk #1). Real-FM swap 시에도
    # 동일 schema 유지 (noise_pct=0)로 깨끗한 diff.
    noise_pct: 0.0
    noise_seed: 42
    noise_per_method: {}

# ─────────────────────────────────────────────────────────────────────────────
# Threshold reference (read-only) / Threshold 참고 (read-only):
#
#   Hypotension rule / 저혈압 규칙
#     MAP_TARGET            : 75.0   mmHg
#     MAP_RISK_FLOOR        : 55.0   mmHg (risk saturates at/below)
#     SLOPE_RISK_FLOOR      : -5.0   mmHg/min (risk saturates at/below)
#
#   Cardiac arrest rule / 심정지 규칙
#     ARREST_HR_LOW         : 40.0   bpm
#     ARREST_HR_HIGH        : 180.0  bpm
#     ARREST_MAP_LOW        : 50.0   mmHg
#
#   Quality rule / 품질 규칙
#     QUALITY_NAN_CUTOFF    : 0.10
#     QUALITY_FLATLINE_STD_EPS: 1e-3
#
#   Consistency rule / 일관성 규칙
#     CONSISTENCY_QUALITY_GATE: 0.7
#
#   Trend rule / Trend 규칙
#     TREND_STABLE_BAND     : 1.0 mmHg/min
#
# `[CLINICIAN-REVIEW: 의료진 검토 필요]` for every threshold above.
# ─────────────────────────────────────────────────────────────────────────────
