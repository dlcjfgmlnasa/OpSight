# ─────────────────────────────────────────────────────────────────────────────
# Default FM config — pointer to the active tier / 기본 FM 설정 — 활성 tier 지정.
#
# This file is what `create_fm(config)` consumes by convention. Update the
# `implementation` value to switch tiers; no code change required (ADR-011 swap).
# 본 파일은 관례적으로 `create_fm(config)`가 소비한다. tier 교체는
# `implementation` 값만 변경하면 된다 (ADR-011 swap, 코드 변경 X).
#
# Lifecycle / 변경 이력:
#   Week 1–3              : mock_stub       (plan_1.1.5 — interface + latency)
#   Week 4–8 (← active)   : mock_rule_based (plan_1.6.5 — plausible reasoning)
#   Optional (time-perm.) : mock_light_ml   (plan_1.7.5 — baseline-backed proxy)
#   Stage 2 (Month 3+)    : real             (after ADR-011 migration protocol)
#
# Switched to mock_rule_based on 2026-05-16 after plan_1.6.5 implementation
# (31 unit tests passing).
# 2026-05-16에 plan_1.6.5 구현 완료 후 mock_rule_based로 전환 (31 unit test 통과).
#
# Spec / 명세:
#   docs/fm_interface_guide.md §3 (Factory & config schema).
#   ADR-011 §"Swap mechanism".
# ─────────────────────────────────────────────────────────────────────────────
fm:
  implementation: mock_rule_based
  config:
    seed: 42
    latent_dim: 128
    sampling_rate_hz: 500.0
    # Noise injection — small jitter exposes agent reasoning to mock-vs-real
    # variance (ADR-011 risk #1 mitigation). Set to 0 for deterministic runs.
    # Noise 주입 — agent reasoning이 mock-vs-real 분산에 노출되도록 작은 jitter
    # (ADR-011 risk #1 완화). 결정적 실행을 원할 때 0으로.
    noise_pct: 0.0
    noise_seed: 42
    noise_per_method: {}
