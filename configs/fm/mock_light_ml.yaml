# ─────────────────────────────────────────────────────────────────────────────
# Mock FM Tier 3 — Light ML config / Tier 3 Light ML 설정.
#
# Owner: plan_1.7.5 (LightMLBiosignalFM).
# Spec : docs/fm_interface_guide.md §2, ADR-011 §"3 tiers".
#
# Status / 상태:
#   Implemented (2026-05-17, Sprint 5). Wraps plan_1.4 baselines (LogReg / LSTM
#   / Hatib-style) behind BiosignalFMInterface as a real-FM proxy.
#   구현 완료 (2026-05-17, Sprint 5). plan_1.4 baseline 을 Protocol 뒤에서 wrap.
#
# Purpose / 용도:
#   - Rule-based 보다 real FM 양상에 더 가까운 proxy.
#   - Mock-vs-real swap 시점의 비교 정밀도 향상.
#
# Method backing / Method-to-baseline routing:
#   - predict_hypotension  → primary_baseline (logreg_abp 기본)
#   - 7 other methods       → BaselineFMAdapter 의 deterministic rule
#     (assess_signal_quality / cross_modal_consistency / temporal_trend /
#      forecast_signal / anomaly_score / predict_cardiac_arrest / encode)
#   본 분배는 plan_1.4 baseline 의 학습 범위 (hypotension 위주) 와 일치.
# ─────────────────────────────────────────────────────────────────────────────
fm:
  implementation: mock_light_ml
  config:
    # 학습된 baseline 중 predict_hypotension 을 backing 할 모델.
    # Options: "logreg_abp" (기본), "lstm_abp", "hatib_style", "xgb_multimodal".
    # "xgb_multimodal" 은 xgboost 미설치 환경에서는 unfitted fallback 으로 동작.
    # Selects the baseline backing predict_hypotension.
    # Options: "logreg_abp" (default), "lstm_abp", "hatib_style", "xgb_multimodal".
    primary_baseline: logreg_abp

    # Baseline 생성 시 kwargs (LogRegABPBaseline 등이 받는 인자).
    # Empty = baseline 의 default config (sampling_rate_hz=500.0 등).
    # kwargs forwarded to baseline constructor. Empty = baseline default.
    baseline_config: {}

    # Pre-trained checkpoint 경로 (선택). None 시 untrained baseline 사용 —
    # untrained 시 adapter 가 risk=0.5, uncertainty=0.9 fallback 출력.
    # Optional path to trained checkpoint. None = untrained baseline (adapter
    # returns risk=0.5, uncertainty=0.9 fallback).
    checkpoint_path: null

    latent_dim: 128
    seed: 42

    # Latency simulation — real-FM 도착 후 측정치로 갱신.
    # Latency simulation — to be updated post real-FM benchmarking.
    latency_sim_sec: 0.0
    latency_per_method:
      # encode:                  0.020
      # predict_hypotension:     0.015   # baseline forward (logreg ~ms, lstm ~10s of ms)
      # predict_cardiac_arrest:  0.005   # rule-based
      # assess_signal_quality:   0.003
      # cross_modal_consistency: 0.005
      # temporal_trend:          0.003
      # forecast_signal:         0.010
      # anomaly_score:           0.003
      {}
    latency_jitter_pct: 0.0
